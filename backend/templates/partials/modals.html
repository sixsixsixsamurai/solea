<div id="overlay" class="overlay"></div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
    <h2>Login</h2>
    <form method="post" action="{% url 'users:login' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Login" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="signIn" type="submit">Sign in</button>
        <p style="margin-top:12px; font-size:14px;">
            No account? <a href="{% url 'users:register' %}">Register</a>
        </p>
    </form>
</div>

<!-- CART DRAWER -->
<div id="cartDrawer" class="cart-drawer">
    <div class="cart-drawer__header">
        <h3>Cart</h3>
        <button class="cart-drawer__close" id="closeCartDrawer">&#10006;</button>
    </div>
    <div class="cart-drawer__body" id="cartDrawerBody">
        <div class="cart-drawer__loading">Loading...</div>
    </div>
    <div class="cart-drawer__footer" id="cartDrawerFooter" style="display:none;">
        <div class="cart-drawer__total">
            <span>Total:</span>
            <span id="cartDrawerTotal">$0.00</span>
        </div>
        <a href="{% url 'orders:cart' %}" class="cart-drawer__checkout">Checkout</a>
    </div>
</div>

<!-- SORT MODAL -->
<div id="sortModal" class="modal">
    <h2>Sort by...</h2>
    <div class="rButtons">
        <div class="R">
            <input type="radio" id="price_asc" name="sort" value="price_asc">
            <label for="price_asc">Sort by price ↑</label>
        </div>
        <div class="R">
            <input type="radio" id="price_desc" name="sort" value="price_desc">
            <label for="price_desc">Sort by price ↓</label>
        </div>
        <div class="R">
            <input type="radio" id="quick" name="sort" value="quick">
            <label for="quick">Quick</label>
        </div>
        <div class="R">
            <input type="radio" id="vegan" name="category" value="vegan">
            <label for="vegan">Vegan</label>
        </div>
        <div class="R">
            <input type="radio" id="protein" name="category" value="protein">
            <label for="protein">Protein</label>
        </div>
    </div>
    <div class="CSbuttons">
        <button class="sort" id="applySort">Sort</button>
        <button class="close">&#10006;</button>
    </div>
</div>
